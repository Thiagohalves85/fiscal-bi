services:

  # ─── Banco de Dados ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: fiscal-bi-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       fiscal_bi
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"        
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fiscal_bi"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend Spring Boot ───────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fiscal-bi-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/fiscal_bi
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_FLYWAY_ENABLED:      "false"
    ports:
      - "8080:8080"       
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/cidades || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s

  # ─── Frontend React + Nginx ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fiscal-bi-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local
